document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  const FONT_MIME = /^(font[/]|application[/](x-)?font-|application[/]vnd\.ms-fontobject)/i;
  const MIME_TOKEN = /^[\w.+-]+[/][\w.+-]+$/;
  function toBase64(bytes) {
    let bin = '';
    for (let i = 0; i < bytes.length; i += 0x8000) {
      bin += String.fromCharCode.apply(null, bytes.subarray(i, i + 0x8000));
    }
    return btoa(bin);
  }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    // Failed resource loads (CSP-blocked links, scripts, images) fire plain
    // events at the element — warn only; real JS errors carry message/error.
    if (!e.message && !e.error && e.target && e.target !== window) {
      console.warn('[bundle] resource failed to load:',
        e.target.tagName, String(e.target.src || e.target.href || ''));
      return;
    }
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    const resourceBlobs = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        if (FONT_MIME.test(entry.mime) && MIME_TOKEN.test(entry.mime)) {
          // Strict artifact hosts allow font-src data: but not blob:.
          blobUrls[uuid] = 'data:' + entry.mime + ';base64,' +
            (entry.compressed ? toBase64(finalBytes) : entry.data);
        } else {
          const blob = new Blob([finalBytes], { type: entry.mime });
          blobUrls[uuid] = URL.createObjectURL(blob);
          resourceBlobs[blobUrls[uuid]] = blob;
        }
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        const blob = new Blob([], { type: entry.mime });
        blobUrls[uuid] = URL.createObjectURL(blob);
        resourceBlobs[blobUrls[uuid]] = blob;
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    // Artifact-host CSP (connect-src 'self') refuses fetch() of blob: URLs —
    // consumers read these Blobs directly. Survives the swap like the error sink.
    window.__resourceBlobs = resourceBlobs;

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).replace(/<\//g, '<\\/') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: read and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const pre = resourceBlobs[s.src.split('#')[0]];
        s.textContent = pre ? await pre.text() : await (await fetch(s.src)).text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

div>\n          <\u002Fdiv>\n        <\u002Fdiv>\n        <div style=\"margin-top: 26px; font-size: 26px; font-weight: 700; line-height: 1.3;\">คำนวณสารอาหาร<br>จากส่วนประกอบเมนู<\u002Fdiv>\n        <div style=\"margin-top: 8px; font-size: 14px; opacity: 0.9; line-height: 1.5;\">เลือกวัตถุดิบ ระบุปริมาณเป็นกรัม แล้วดูพลังงาน สารอาหาร และ % Thai RDI พร้อมฉลากโภชนาการ<\u002Fdiv>\n      <\u002Fdiv>\n\n      <div style=\"padding: 0 20px; margin-top: -56px;\">\n        <button sc-camel-on-click=\"{{ goCreate }}\" style=\"width: 100%; border: none; cursor: pointer; background: #fff; border-radius: 18px; padding: 20px; display: flex; align-items: center; gap: 14px; box-shadow: 0 8px 24px rgba(7,138,134,0.18); text-align: left;\">\n          <div style=\"width: 48px; height: 48px; border-radius: 14px; background: #0ABAB5; color: #fff; display: grid; place-items: center; font-size: 26px; font-weight: 600; flex-shrink: 0;\">+<\u002Fdiv>\n          <div style=\"flex: 1;\">\n            <div style=\"font-size: 17px; font-weight: 700; color: #0B3B39;\">สร้างเมนูใหม่<\u002Fdiv>\n            <div style=\"font-size: 13px; color: #5E7C7A; margin-top: 2px;\">เริ่มใส่ส่วนประกอบและคำนวณ<\u002Fdiv>\n          <\u002Fdiv>\n          <div style=\"color: #0ABAB5; font-size: 20px;\">›<\u002Fdiv>\n        <\u002Fbutton>\n      <\u002Fdiv>\n\n      <div style=\"display: grid; grid-template-columns: 1fr 1fr; gap: 12px; padding: 16px 20px 0;\">\n        <div style=\"background: #fff; border-radius: 16px; padding: 16px; border: 1px solid #DCEEEC;\">\n          <div style=\"font-size: 26px; font-weight: 700; color: #078A86;\">{{ dbCount }}<\u002Fdiv>\n          <div style=\"font-size: 13px; color: #5E7C7A;\">วัตถุดิบในฐานข้อมูล<\u002Fdiv>\n        <\u002Fdiv>\n        <button sc-camel-on-click=\"{{ goSaved }}\" style=\"background: #fff; border-radius: 16px; padding: 16px; border: 1px solid #DCEEEC; text-align: left; cursor: pointer;\">\n          <div style=\"font-size: 26px; font-weight: 700; color: #078A86;\">{{ savedCount }}<\u002Fdiv>\n          <div style=\"font-size: 13px; color: #5E7C7A;\">เมนูที่บันทึกไว้<\u002Fdiv>\n        <\u002Fbutton>\n      <\u002Fdiv>\n\n      <sc-if value=\"{{ hasSaved }}\" hint-placeholder-val=\"{{ false }}\">\n        <div style=\"padding: 22px 20px 10px;\">\n          <div style=\"display: flex; align-items: baseline; justify-content: space-between;\">\n            <div style=\"font-size: 16px; font-weight: 700; color: #0B3B39;\">เมนูล่าสุด<\u002Fdiv>\n            <button sc-camel-on-click=\"{{ goSaved }}\" style=\"border: none; background: none; color: #078A86; font-size: 13px; font-weight: 600; cursor: pointer;\">ดูทั้งหมด ›<\u002Fbutton>\n          <\u002Fdiv>\n          <div style=\"display: flex; flex-direction: column; gap: 10px; margin-top: 10px;\">\n            <sc-for list=\"{{ recentMenus }}\" as=\"m\" hint-placeholder-count=\"2\">\n              <button sc-camel-on-click=\"{{ m.open }}\" style=\"border: 1px solid #DCEEEC; background: #fff; border-radius: 14px; padding: 14px 16px; display: flex; align-items: center; gap: 12px; cursor: pointer; text-align: left;\">\n                <div style=\"width: 40px; height: 40px; border-radius: 12px; background: #E0F5F4; color: #078A86; display: grid; place-items: center; font-weight: 700; font-size: 15px; flex-shrink: 0;\">{{ m.initial }}<\u002Fdiv>\n                <div style=\"flex: 1; min-width: 0;\">\n                  <div style=\"font-size: 15px; font-weight: 600; color: #0B3B39; white-space: nowrap; overflow: hidden; text-overflow: ellipsis;\">{{ m.name }}<\u002Fdiv>\n                  <div style=\"font-size: 12.5px; color: #5E7C7A;\">{{ m.meta }}<\u002Fdiv>\n                <\u002Fdiv>\n                <div style=\"font-size: 14px; font-weight: 700; color: #078A86; flex-shrink: 0;\">{{ m.kcal }} kcal<\u002Fdiv>\n              <\u002Fbutton>\n            <\u002Fsc-for>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fsc-if>\n      <div style=\"flex: 1;\"><\u002Fdiv>\n      <div style=\"padding: 22px 24px 20px; text-align: center; border-top: 1px solid #E3F1EF; margin-top: 20px; background: rgba(255,255,255,0.92);\">\n        <div style=\"font-size: 12.5px; color: #0B3B39; font-weight: 700;\">Developer: Assoc. Prof. Dr.Suphachai Charoensin<\u002Fdiv>\n        <div style=\"font-size: 11.5px; color: #3D5C5A; margin-top: 6px; line-height: 1.5;\">Copyright © 2026 School of Medical Sciences,<br>University of Phayao<\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsc-if>\n\n  <!-- ═══════════ สร้างเมนู ═══════════ -->\n  <sc-if value=\"{{ isCreate }}\" hint-placeholder-val=\"{{ false }}\">\n    <div data-screen-label=\"สร้างเมนู\" style=\"flex: 1; display: flex; flex-direction: column;\">\n      <div style=\"position: sticky; top: 0; z-index: 5; background: #F4FBFA; padding: 14px 20px 10px; border-bottom: 1px solid #E3F1EF;\">\n        <div style=\"font-size: 19px; font-weight: 700; color: #0B3B39;\">{{ createTitle }}<\u002Fdiv>\n      <\u002Fdiv>\n\n      <div style=\"padding: 16px 20px 8px; display: flex; flex-direction: column; gap: 12px;\">\n        <input value=\"{{ menuName }}\" sc-camel-on-change=\"{{ onMenuName }}\" placeholder=\"ชื่อเมนู เช่น ผัดกะเพราไก่ไข่ดาว\" style=\"width: 100%; border: 1px solid #C9E4E2; border-radius: 12px; padding: 13px 14px; font-size: 15px; background: #fff; color: #0B3B39;\">\n        <div style=\"display: flex; align-items: center; justify-content: space-between; background: #fff; border: 1px solid #C9E4E2; border-radius: 12px; padding: 10px 14px;\">\n          <div style=\"font-size: 14.5px; color: #0B3B39; font-weight: 500;\">จำนวนหน่วยบริโภค (เสิร์ฟ)<\u002Fdiv>\n          <div style=\"display: flex; align-items: center; gap: 14px;\">\n            <button sc-camel-on-click=\"{{ servDown }}\" style=\"width: 34px; height: 34px; border-radius: 10px; border: 1px solid #C9E4E2; background: #F0FAF9; color: #078A86; font-size: 18px; font-weight: 700; cursor: pointer;\">−<\u002Fbutto px; text-align: center; color: #0B3B39; background: #F7FCFB;\">\n                <span style=\"font-size: 13px; color: #5E7C7A;\">กรัม<\u002Fspan>\n                <button sc-camel-on-click=\"{{ it.onRemove }}\" style=\"width: 30px; height: 30px; border: none; border-radius: 9px; background: #FCEEEA; color: #C4614C; font-size: 15px; cursor: pointer; margin-left: 2px;\">✕<\u002Fbutton>\n              <\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fsc-for>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <div style=\"padding: 14px 20px 8px;\">\n        <div style=\"font-size: 15px; font-weight: 700; color: #0B3B39; margin-bottom: 8px;\">ค้นหาวัตถุดิบ<\u002Fdiv>\n        <input value=\"{{ query }}\" sc-camel-on-change=\"{{ onQuery }}\" placeholder=\"ค้นหา เช่น อกไก่, กะทิ, น้ำปลา\" style=\"width: 100%; border: 1px solid #C9E4E2; border-radius: 12px; padding: 13px 14px; font-size: 15px; background: #fff; color: #0B3B39;\">\n        <div style=\"display: flex; gap: 8px; overflow-x: auto; padding: 10px 0 2px; scrollbar-width: none;\">\n          <sc-for list=\"{{ chips }}\" as=\"c\" hint-placeholder-count=\"5\">\n            <button sc-camel-on-click=\"{{ c.onPick }}\" style=\"flex-shrink: 0; border: 1px solid {{ c.border }}; background: {{ c.bg }}; color: {{ c.color }}; border-radius: 999px; padding: 7px 14px; font-size: 13px; font-weight: 600; cursor: pointer;\">{{ c.name }}<\u002Fbutton>\n          <\u002Fsc-for>\n        <\u002Fdiv>\n        <div style=\"display: flex; flex-direction: column; gap: 6px; margin-top: 6px;\">\n          <sc-for list=\"{{ results }}\" as=\"r\" hint-placeholder-count=\"4\">\n            <button sc-camel-on-click=\"{{ r.onAdd }}\" style=\"border: none; background: #fff; border: 1px solid #E3F1EF; border-radius: 12px; padding: 11px 12px; display: flex; align-items: center; gap: 10px; cursor: pointer; text-align: left;\">\n              <div style=\"flex: 1; min-width: 0;\">\n                <div style=\"font-size: 14.5px; font-weight: 500; color: #0B3B39;\">{{ r.name }}<\u002Fdiv>\n                <div style=\"font-size: 12px; color: #5E7C7A;\">{{ r.sub }}<\u002Fdiv>\n              <\u002Fdiv>\n              <div style=\"width: 32px; height: 32px; border-radius: 10px; background: #E0F5F4; color: #078A86; display: grid; place-items: center; font-size: 18px; font-weight: 700; flex-shrink: 0;\">+<\u002Fdiv>\n            <\u002Fbutton>\n          <\u002Fsc-for>\n          <sc-if value=\"{{ noResults }}\" hint-placeholder-val=\"{{ false }}\">\n            <div style=\"padding: 14px; text-align: center; font-size: 13.5px; color: #5E7C7A;\">ไม่พบวัตถุดิบที่ค้นหา<\u002Fdiv>\n          <\u002Fsc-if>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <div style=\"flex: 1;\"><\u002Fdiv>\n      <div style=\"position: sticky; bottom: 64px; padding: 12px 20px; background: linear-gradient(to top, #F4FBFA 70%, rgba(244,251,250,0));\">\n        <button sc-camel-on-click=\"{{ calc }}\" disabled=\"{{ calcDisabled }}\" style=\"width: 100%; border: none; border-radius: 14px; padding: 16px; font-size: 16px; font-weight: 700; cursor: pointer; background: {{ calcBg }}; color: {{ calcColor }}; box-shadow: 0 6px 18px rgba(7,138,134,0.25); display: flex; align-items: center; justify-content: center; gap: 8px;\">\n          <span>คำนวณสารอาหาร<\u002Fspan>\n          <span style=\"font-weight: 500; font-size: 14px; opacity: 0.85;\">{{ previewKcal }}<\u002Fspan>\n        <\u002Fbutton>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsc-if>\n\n  <!-- ═══════════ ผลลัพธ์ ═══════════ -->\n  <sc-if value=\"{{ isResults }}\" hint-placeholder-val=\"{{ false }}\">\n    <div data-screen-label=\"ผลลัพธ์\" style=\"flex: 1; display: flex; flex-direction: column;\">\n      <div style=\"position: sticky; top: 0; z-index: 5; background: #F4FBFA; padding: 14px 20px 10px; border-bottom: 1px solid #E3F1EF; display: flex; align-items: center; gap: 10px;\">\n        <button sc-camel-on-click=\"{{ backFromResults }}\" style=\"width: 34px; height: 34px; border: 1px solid #DCEEEC; background: #fff; border-radius: 10px; color: #078A86; font-size: 17px; cursor: pointer;\">‹<\u002Fbutton>\n        <div style=\"flex: 1; min-width: 0;\">\n          <div style=\"font-size: 17px; font-weight: 700; color: #0B3B39; white-space: nowrap; overflow: hidden; text-overflow: ellipsis;\">{{ resultName }}<\u002Fdiv>\n          <div style=\"font-size: 12.5px; color: #5E7C7A;\">{{ resultMeta }}<\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <div style=\"padding: 14px 20px 0;\">\n        <div style=\"display: flex; background: #E3F1EF; border-radius: 12px; padding: 4px; gap: 4px;\">\n          <button sc-camel-on-click=\"{{ setPerServing }}\" style=\"flex: 1; border: none; border-radius: 9px; padding: 9px; font-size: 13.5px; font-weight: 600; cursor: pointer; background: {{ segServBg }}; color: {{ segServColor }}; box-shadow: {{ segServShadow }};\">ต่อหน่วยบริโภค<\u002Fbutton>\n          <button sc-camel-on-click=\"{{ setWhole }}\" style=\"flex: 1; border: none; border-radius: 9px; padding: 9px; font-size: 13.5px; font-weight: 600; cursor: pointer; background: {{ segWholeBg }}; color: {{ segWholeColor }}; box-shadow: {{ segWholeShadow }};\">ทั้งสูตร<\u002Fbutton>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <div style=\"margin: 14px 20px 0; background: linear-gradient(160deg, #0ABAB5, #078A86); border-radius: 18px; padding: 20px; color: #fff;\">\n        <div style=\"font-size: 13px; opacity: 0.9;\">พลังงานทั้งหมด {{ scopeLabel }}<\u002Fdiv>\n        <div style=\"display: flex; align-items: baseline; gap: 6px; margin-top: 2px;\">\n          <div style=\"font-size: 40px; font-weight: 700; line-height: 1;\">{{ heroKcal }}<\u002Fdiv>\n          <div style=\"font-size: 15px; opacity: 0.9;\">กิโลแคลอรี<\u002Fdiv>\n        <\u002Fdiv>\n        <div style=\"display: flex; justify-content: space-between; align-items: baseline; margin-top: 10px; padding: 9px 12px; background: rgba(255,255,255,0.14); border-radius: 10px;\">\n          <div style=\"font-size: 12.5px;\">พลังงานที่ร่างกายนำไปใช้ได้ (Metabolizable Energy)*<\u002Fdiv>\n          <div style=\"font-size: 16px; font-weight: 700; white-space: nowrap;\">{{ heroME }} kcal<\u002Fdiv>\n        <\u002Fdiv>\n        <div style=\"display: flex; height: 10px; border-radius: 999px; overflow: hidden; margin-top: 14px; background: rgba(255,255,255,0.25);\">\n          <div style=\"width: {{ pctP }}; background: #FFE28A;\"><\u002Fdiv>\n          <div style=\"width: {{ pctF }}; background: #FFB48A;\"><\u002Fdiv>\n          <div style=\"width: {{ pctC }}; background: #FFFFFF;\"><\u002Fdiv>\n        <\u002Fdiv>\n        <div style=\"display: flex; gap: 14px; margin-top: 10px; font-size: 12.5px;\">\n          <div style=\"display: flex; align-items: center; gap: 5px;\"><span style=\"width: 8px; height: 8px; border-radius: 50%; background: #FFE28A;\"><\u002Fspan>โปรตีน {{ pctP }}<\u002Fdiv>\n          <div style=\"display: flex; align-items: center; gap: 5px;\"><span style=\"width: 8px; height: 8px; border-radius: 50%; background: #FFB48A;\"><\u002Fspan>ไขมัน {{ pctF }}<\u002Fdiv>\n          <div style=\"display: flex; align-items: center; gap: 5px;\"><span style=\"width: 8px; height: 8px; border-radius: 50%; background: #FFFFFF;\"><\u002Fspan>คาร์บ {{ pctC }}<\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <div style=\"display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; padding: 12px 20px 0;\">\n        <div style=\"background: #fff; border: 1px solid #DCEEEC; border-radius: 14px; padding: 12px; text-align: center;\">\n          <div style=\"font-size: 12.5px; color: #5E7C7A;\">โปรตีน<\u002Fdiv>\n          <div style=\"font-size: 19px; font-weight: 700; color: #0B3B39;\">{{ gP }}<\u002Fdiv>\n          <div style=\"font-size: 11.5px; color: #5E7C7A;\">กรัม<\u002Fdiv>\n        <\u002Fdiv>\n        <div style=\"background: #fff; border: 1px solid #DCEEEC; border-radius: 14px; padding: 12px; text-align: center;\">\n          <div style=\"font-size: 12.5px; color: #5E7C7A;\">ไขมัน<\u002Fdiv>\n          <div style=\"font-size: 19px; font-weight: 700; color: #0B3B39;\">{{ gF }}<\u002Fdiv>\n          <div style=\"font-size: 11.5px; color: #5E7C7A;\">กรัม<\u002Fdiv>\n        <\u002Fdiv>\n        <div style=\"background: #fff; border: 1px solid #DCEEEC; border-radius: 14px; padding: 12px; text-align: center;\">\n          <div style=\"font-size: 12.5px; color: #5E7C7A;\">คาร์โบไฮเดรต<\u002Fdiv>\n          <div style=\"font-size: 19px; font-weight: 700; color: #0B3B39;\">{{ gC }}<\u002Fdiv>\n          <div style=\"font-size: 11.5px; color: #5E7C7A;\">กรัม<\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <div style=\"padding: 18px 20px 0;\">\n        <div style=\"font-size: 16px; font-weight: 700; color: #0B3B39;\">เทียบ Thai RDI <span style=\"font-size: 12.5px; font-weight: 500; color: #5E7C7A;\">(ต่อวัน, พลังงาน 2,000 kcal)<\u002Fspan><\u002Fdiv>\n        <div style=\"display: flex; flex-direction: column; gap: 12px; margin-top: 12px; background: #fff; border: 1px solid #DCEEEC; border-radius: 16px; padding: 16px;\">\n          <sc-for list=\"{{ rdiRows }}\" as=\"n\" hint-placeholder-count=\"6\">\n            <div>\n              <div style=\"display: flex; justify-content: space-between; font-size: 13.5px; margin-bottom: 4px;\">\n                <span style=\"color: #0B3B39; font-weight: 600;\">{{ n.label }}<\u002Fspan>\n                <span style=\"color: #5E7C7A;\">{{ n.amount }} · <b style=\"color: {{ n.pctColor }};\">{{ n.pct }}<\u002Fb><\u002Fspan>\n              <\u002Fdiv>\n              <div style=\"height: 7px; background: #E9F5F3; border-radius: 999px; overflow: hidden;\">\n                <div style=\"height: 100%; width: {{ n.barW }}; background: {{ n.barColor }}; border-radius: 999px;\"><\u002Fdiv>\n              <\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fsc-for>\n        <\u002Fdiv>\n        <div style=\"font-size: 11.5px; color: #7C9694; margin-top: 8px; line-height: 1.5;\">* ค่าสารอาหารเป็นค่าประมาณจากตารางคุณค่าอาหารเพื่อการเรียนการสอน ควรตรวจสอบกับฐานข้อมูล INMU/อย. สำหรับงานวิชาการ<\u002Fdiv>\n      <\u002Fdiv>\n\n      <div style=\"padding: 20px 20px 0;\">\n        <div style=\"font-size: 16px; font-weight: 700; color: #0B3B39; margin-bottom: 10px;\">ฉลากโภชนาการ<\u002Fdiv>\n        <div style=\"background: #fff; border: 2px solid #0B3B39; border-radius: 6px; padding: 14px 16px; color: #0B3B39;\">\n          <div style=\"font-size: 19px; font-weight: 700; border-bottom: 4px solid #0B3B39; padding-bottom: 6px;\">ข้อมูลโภชนาการ<\u002Fdiv>\n          <div style=\"font-size: 12.5px; padding: 6px 0; border-bottom: 1px solid #0B3B39; line-height: 1.5;\">หนึ่งหน่วยบริโภค : {{ labelServSize }}<br>จำนวนหน่วยบริโภคต่อสูตร : {{ labelServCount }}<\u002Fdiv>\n          <div style=\"display: flex; justify-content: space-between; align-items: baseline; padding: 8px 0 4px; border-bottom: 6px solid #0B3B39;\">\n            <div style=\"font-size: 14px; font-weight: 700;\">คุณค่าทางโภชนาการต่อหนึ่งหน่วยบริโภค<\u002Fdiv>\n          <\u002Fdiv>\n          <div style=\"display: flex; justify-content: space-between; padding: 6px 0; border-bottom: 3px solid #0B3B39; font-size: 15px; font-weight: 700;\">\n            <span>พลังงานทั้งหมด<\u002Fspan><span>{{ labelKcal }} กิโลแคลอรี<\u002Fspan>\n          <\u002Fdiv>\n          <div style=\"display: flex; justify-content: flex-end; font-size: 11.5px; padding: 4px 0 2px; border-bottom: 1px solid #0B3B39; font-weight: 700;\">ร้อยละของปริมาณที่แนะนำต่อวัน*<\u002Fdiv>\n          <sc-for list=\"{{ labelRows }}\" as=\"l\" hint-placeholder-count=\"8\">\n            <div style=\"display: flex; justify-content: space-between; font-size: 13px; padding: 4.5px 0; border-bottom: 1px solid #C9D8D6;\">\n              <span style=\"font-weight: {{ l.weight }}; padding-left: {{ l.indent }};\">{{ l.label }} {{ l.amount }}<\u002Fspan>\n              <span style=\"font-weight: 700;\">{{ l.pct }}<\u002Fspan>\n            <\u002Fdiv>\n          <\u002Fsc-for>\n          <div style=\"font-size: 10.5px; padding-top: 6px; line-height: 1.5;\">* ร้อยละของปริมาณสารอาหารที่แนะนำให้บริโภคต่อวันสำหรับคนไทยอายุตั้งแต่ 6 ปีขึ้นไป (Thai RDI) โดยคิดจากความต้องการพลังงานวันละ 2,000 กิโลแคลอรี<\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <div style=\"padding: 14px 20px 0;\">\n        <div style=\"font-size: 11.5px; color: #7C9694; line-height: 1.5;\">* Metabolizable Energy (ME) คำนวณด้วย Atwater general factors: โปรตีน 4, ไขมัน 9, คาร์โบไฮเดรตที่ย่อยได้ 4 และใยอาหาร 2 kcal/g<\u002Fdiv>\n      <\u002Fdiv>\n      <div style=\"padding: 14px 20px 20px; display: flex; flex-direction: column; gap: 10px;\">\n        <sc-if value=\"{{ showEdit }}\" hint-placeholder-val=\"{{ false }}\">\n          <button sc-camel-on-click=\"{{ editMenu }}\" style=\"width: 100%; border: 1.5px solid #0ABAB5; border-radius: 14px; padding: 14px; font-size: 15.5px; font-weight: 700; cursor: pointer; background: #fff; color: #078A86;\">✎ แก้ไขเมนูนี้<\u002Fbutton>\n        <\u002Fsc-if>\n        <button sc-camel-on-click=\"{{ saveMenu }}\" disabled=\"{{ saveDisabled }}\" style=\"width: 100%; border: none; border-radius: 14px; padding: 15px; font-size: 15.5px; font-weight: 700; cursor: pointer; background: {{ saveBg }}; color: {{ saveColor }};\">{{ saveLabel }}<\u002Fbutton>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsc-if>\n\n  <!-- ═══════════ เมนูของฉัน ═══════════ -->\n  <sc-if value=\"{{ isSaved }}\" hint-placeholder-val=\"{{ false }}\">\n    <div data-screen-label=\"เมนูของฉัน\" style=\"flex: 1; display: flex; flex-direction: column;\">\n      <div style=\"position: sticky; top: 0; z-index: 5; background: #F4FBFA; padding: 14px 20px 10px; border-bottom: 1px solid #E3F1EF;\">\n        <div style=\"font-size: 19px; font-weight: 700; color: #0B3B39;\">เมนูของฉัน<\u002Fdiv>\n        <div style=\"font-size: 13px; color: #5E7C7A;\">{{ savedCount }} เมนูที่บันทึกไว้<\u002Fdiv>\n      <\u002Fdiv>\n      <sc-if value=\"{{ noSaved }}\" hint-placeholder-val=\"{{ false }}\">\n        <div style=\"padding: 48px 32px; text-align: center;\">\n          <div style=\"width: 64px; height: 64px; border-radius: 20px; background: #E0F5F4; color: #078A86; display: grid; place-items: center; font-size: 28px; margin: 0 auto 14px;\">🍲<\u002Fdiv>\n          <div style=\"font-size: 16px; font-weight: 700; color: #0B3B39;\">ยังไม่มีเมนูที่บันทึก<\u002Fdiv>\n          <div style=\"font-size: 13.5px; color: #5E7C7A; margin-top: 6px; line-height: 1.5;\">สร้างเมนู คำนวณสารอาหาร แล้วกดบันทึก<br>เมนูจะมาแสดงที่นี่<\u002Fdiv>\n          <button sc-camel-on-click=\"{{ goCreate }}\" style=\"margin-top: 16px; border: none; background: #0ABAB5; color: #fff; border-radius: 12px; padding: 12px 24px; font-size: 14.5px; font-weight: 700; cursor: pointer;\">+ สร้างเมนูใหม่<\u002Fbutton>\n        <\u002Fdiv>\n      <\u002Fsc-if>\n      <div style=\"display: flex; flex-direction: column; gap: 10px; padding: 14px 20px;\">\n        <sc-for list=\"{{ savedRows }}\" as=\"m\" hint-placeholder-count=\"0\">\n          <div style=\"background: #fff; border: 1px solid #DCEEEC; border-radius: 14px; padding: 14px 16px; display: flex; align-items: center; gap: 12px;\">\n            <button sc-camel-on-click=\"{{ m.open }}\" style=\"flex: 1; min-width: 0; border: none; background: none; padding: 0; display: flex; align-items: center; gap: 12px; cursor: pointer; text-align: left;\">\n              <div style=\"width: 42px; height: 42px; border-radius: 12px; background: #E0F5F4; color: #078A86; display: grid; place-items: center; font-weight: 700; font-size: 16px; flex-shrink: 0;\">{{ m.initial }}<\u002Fdiv>\n              <div style=\"flex: 1; min-width: 0;\">\n                <div style=\"font-size: 15px; font-weight: 600; color: #0B3B39; white-space: nowrap; overflow: hidden; text-overflow: ellipsis;\">{{ m.name }}<\u002Fdiv>\n                <div style=\"font-size: 12.5px; color: #5E7C7A;\">{{ m.meta }}<\u002Fdiv>\n              <\u002Fdiv>\n              <div style=\"font-size: 14px; font-weight: 700; color: #078A86; flex-shrink: 0;\">{{ m.kcal }} kcal<\u002Fdiv>\n            <\u002Fbutton>\n            <button sc-camel-on-click=\"{{ m.onEdit }}\" style=\"width: 32px; height: 32px; border: none; border-radius: 10px; background: #E0F5F4; color: #078A86; font-size: 14px; cursor: pointer; flex-shrink: 0;\">✎<\u002Fbutton>\n            <button sc-camel-on-click=\"{{ m.onDelete }}\" style=\"width: 32px; height: 32px; border: none; border-radius: 10px; background: #FCEEEA; color: #C4614C; font-size: 14px; cursor: pointer; flex-shrink: 0;\">✕<\u002Fbutton>\n          <\u002Fdiv>\n        <\u002Fsc-for>\n      <\u002Fdiv>\n      <div style=\"flex: 1;\"><\u002Fdiv>\n      <div style=\"padding: 22px 24px 20px; text-align: center; border-top: 1px solid #E3F1EF; background: rgba(255,255,255,0.92);\">\n        <div style=\"font-size: 12.5px; color: #0B3B39; font-weight: 700;\">Developer: Assoc. Prof. Dr.Suphachai Charoensin<\u002Fdiv>\n        <div style=\"font-size: 11.5px; color: #3D5C5A; margin-top: 6px; line-height: 1.5;\">Copyright © 2026 School of Medical Sciences,<br>University of Phayao<\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsc-if>\n\n  <!-- ═══════════ แถบนำทางล่าง ═══════════ -->\n  <div style=\"position: sticky; bottom: 0; z-index: 10; background: #fff; border-top: 1px solid #E3F1EF; display: grid; grid-template-columns: 1fr 1fr 1fr; padding: 6px 8px calc(6px + env(safe-area-inset-bottom));\">\n    <button sc-camel-on-click=\"{{ goHome }}\" style=\"border: none; background: none; cursor: pointer; padding: 8px 0 6px; display: flex; flex-direction: column; align-items: center; gap: 3px; color: {{ tabHomeColor }}; min-height: 44px;\">\n      <span style=\"font-size: 19px; line-height: 1;\">⌂<\u002Fspan>\n      <span style=\"font-size: 11.5px; font-weight: {{ tabHomeWeight }};\">หน้าแรก<\u002Fspan>\n    <\u002Fbutton>\n    <button sc-camel-on-click=\"{{ goCreate }}\" style=\"border: none; background: none; cursor: pointer; padding: 8px 0 6px; display: flex; flex-direction: column; align-items: center; gap: 3px; color: {{ tabCreateColor }}; min-height: 44px;\">\n      <span style=\"font-size: 19px; line-height: 1;\">＋<\u002Fspan>\n      <span style=\"font-size: 11.5px; font-weight: {{ tabCreateWeight }};\">สร้างเมนู<\u002Fspan>\n    <\u002Fbutton>\n    <button sc-camel-on-click=\"{{ goSaved }}\" style=\"border: none; background: none; cursor: pointer; padding: 8px 0 6px; display: flex; flex-direction: column; align-items: center; gap: 3px; color: {{ tabSavedColor }}; min-height: 44px;\">\n      <span style=\"font-size: 19px; line-height: 1;\">≡<\u002Fspan>\n      <span style=\"font-size: 11.5px; font-weight: {{ tabSavedWeight }};\">เมนูของฉัน<\u002Fspan>\n    <\u002Fbutton>\n  <\u002Fdiv>\n<\u002Fdiv>\n\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\" data-props=\"{&quot;$preview&quot;: {&quot;width&quot;: 420, &quot;height&quot;: 900}}\">\nclass Component extends DCLogic {\n  state = {\n    screen: 'home',\n    menuName: '',\n    servings: 2,\n    items: [],           // [{ingId, grams}]\n    query: '',\n    cat: 'all',\n    saved: [],\n    justSaved: false,\n    editingId: null,\n    perServing: true,\n    resultFrom: 'create', // 'create' | 'saved'\n    viewMenu: null,       // saved menu object when opened from list\n    db: null,\n  };\n\n  componentDidMount() {\n    import('./ingredients.js').then(mod => {\n      let saved = [];\n      try { saved = JSON.parse(localStorage.getItem('nutrical-menus') || '[]'); } catch (e) {}\n      this.setState({ db: mod, saved });\n    });\n  }\n\n  persist(saved) {\n    localStorage.setItem('nutrical-menus', JSON.stringify(saved));\n  }\n\n  startEdit(m) {\n    return () => this.setState({\n      screen: 'create', resultFrom: 'create', viewMenu: null,\n      editingId: m.id, menuName: m.name, servings: m.servings,\n      items: m.items.map(it => ({ ingId: it.ingId, grams: it.grams })),\n      justSaved: false,\n    });\n  }\n\n  fmt(n, d) {\n    if (d === undefined) d = 1;\n    const v = Number(n) || 0;\n    const r = v >= 100 ? Math.round(v) : Math.round(v * Math.pow(10, d)) / Math.pow(10, d);\n    return r.toLocaleString('en-US');\n  }\n\n  totalsFor(items) {\n    const { INGREDIENTS } = this.state.db;\n    const keys = ['kcal','protein','fat','carb','sugar','fiber','sodium','ca','fe','vitA','vitC'];\n    const t = {}; keys.forEach(k => t[k] = 0);\n    let weight = 0;\n    items.forEach(it => {\n      const ing = INGREDIENTS.find(i => i.id === it.ingId);\n      if (!ing) return;\n      const f = (Number(it.grams) || 0) / 100;\n      weight += Number(it.grams) || 0;\n      keys.forEach(k => t[k] += ing[k] * f);\n    });\n    t.weight = weight;\n    return t;\n  }\n\n  renderVals() {\n    const s = this.state;\n    if (!s.db) {\n      return { isHome: true, dbCount: '…', savedCount: 0, hasSaved: false, recentMenus: [],\n        goHome: () => {}, goCreate: () => {}, goSaved: () => {},\n        tabHomeColor: '#078A86', tabCreateColor: '#8AA5A3', tabSavedColor: '#8AA5A3',\n        tabHomeWeight: 700, tabCreateWeight: 500, tabSavedWeight: 500 };\n    }\n    const { INGREDIENTS, CATEGORIES, THAI_RDI, NUTRIENT_META } = s.db;\n    const go = (screen) => () => this.setState({ screen });\n    const fmt = this.fmt.bind(this);\n\n    // ---- nav / tabs ----\n    const active = s.screen === 'results' ? 'create' : s.screen;\n    const tab = (name) => active === name;\n\n    // ---- create screen ----\n    const itemRows = s.items.map((it, idx) => {\n      const ing = INGREDIENTS.find(i => i.id === it.ingId);\n      const kcal = ing ? ing.kcal * (Number(it.grams) || 0) / 100 : 0;\n      return {\n        name: ing ? ing.name : '?',\n        grams: it.grams,\n        kcalText: fmt(kcal, 0) + ' kcal · ' + fmt(ing ? ing.kcal : 0, 0) + ' kcal/100 ก.',\n        onGrams: (e) => {\n          const items = s.items.slice();\n          items[idx] = Object.assign({}, items[idx], { grams: e.target.value });\n          this.setState({ items, justSaved: false });\n        },\n        onRemove: () => {\n          const items = s.items.slice(); items.splice(idx, 1);\n          this.setState({ items, justSaved: false });\n        },\n      };\n    });\n\n    const q = s.query.trim().toLowerCase();\n    const filtered = INGREDIENTS.filter(i =>\n      (s.cat === 'all' || i.cat === s.cat) &&\n      (!q || i.name.toLowerCase().includes(q))\n    );\n    const catName = (id) => { const c = CATEGORIES.find(c => c.id === id); return c ? c.name : ''; };\n    const results = filtered.slice(0, 12).map(i => ({\n      name: i.name,\n      sub: catName(i.cat) + ' · ' + fmt(i.kcal, 0) + ' kcal/100 ก.',\n      onAdd: () => {\n        if (s.items.some(it => it.ingId === i.id)) return;\n        this.setState({ items: s.items.concat([{ ingId: i.id, grams: 100 }]), justSaved: false });\n      },\n    }));\n\n    const chips = [{ id: 'all', name: 'ทั้งหมด' }].concat(CATEGORIES).map(c => {\n      const on = s.cat === c.id;\n      return {\n        name: c.name,\n        bg: on ? '#0ABAB5' : '#fff', color: on ? '#fff' : '#48706E', border: on ? '#0ABAB5' : '#C9E4E2',\n        onPick: () => this.setState({ cat: c.id }),\n      };\n    });\n\n    const liveTotals = this.totalsFor(s.items);\n    const hasItems = s.items.length > 0;\n\n    // ---- results ----\n    const isViewingSaved = s.resultFrom === 'saved' && s.viewMenu;\n    const rItems = isViewingSaved ? s.viewMenu.items : s.items;\n    const rName = (isViewingSaved ? s.viewMenu.name : s.menuName) || 'เมนูไม่มีชื่อ';\n    const rServ = isViewingSaved ? s.viewMenu.servings : s.servings;\n    const totals = this.totalsFor(rItems);\n    const div = s.perServing ? Math.max(1, rServ) : 1;\n    const T = {}; Object.keys(totals).forEach(k => T[k] = totals[k] / div);\n\n    // Metabolizable Energy (Atwater): P4 + F9 + digestible-carb 4 + fiber 2\n    const meOf = (x) => x.protein * 4 + x.fat * 9 + Math.max(0, x.carb - x.fiber) * 4 + x.fiber * 2;\n    const eP = T.protein * 4, eF = T.fat * 9, eC = T.carb * 4;\n    const eSum = Math.max(1e-6, eP + eF + eC);\n    const pct = (x) => Math.round(x / eSum * 100) + '%';\n\n    const rdiRows = NUTRIENT_META.map(m => {\n      const val = T[m.key];\n      const p = val / THAI_RDI[m.key] * 100;\n      const over = p > 100;\n      return {\n        label: m.label,\n        amount: fmt(val) + ' ' + m.unit,\n        pct: Math.round(p) + '%',\n        pctColor: over ? '#C4614C' : '#078A86',\n        barW: Math.min(100, p) + '%',\n        barColor: over ? '#E08A6E' : '#0ABAB5',\n      };\n    });\n\n    // ฉลาก: ต่อหนึ่งหน่วยบริโภคเสมอ\n    const perServ = {}; Object.keys(totals).forEach(k => perServ[k] = totals[k] / Math.max(1, rServ));\n    const rdiPct = (k) => Math.round(perServ[k] / THAI_RDI[k] * 100) + '%';\n    const labelRows = [\n      { label: 'ไขมันทั้งหมด', amount: fmt(perServ.fat) + ' ก.', pct: rdiPct('fat'), weight: 700, indent: '0' },\n      { label: 'โปรตีน', amount: fmt(perServ.protein) + ' ก.', pct: rdiPct('protein'), weight: 700, indent: '0' },\n      { label: 'คาร์โบไฮเดรตทั้งหมด', amount: fmt(perServ.carb) + ' ก.', pct: rdiPct('carb'), weight: 700, indent: '0' },\n      { label: 'ใยอาหาร', amount: fmt(perServ.fiber) + ' ก.', pct: rdiPct('fiber'), weight: 400, indent: '14px' },\n      { label: 'น้ำตาล', amount: fmt(perServ.sugar) + ' ก.', pct: rdiPct('sugar'), weight: 400, indent: '14px' },\n      { label: 'โซเดียม', amount: fmt(perServ.sodium, 0) + ' มก.', pct: rdiPct('sodium'), weight: 700, indent: '0' },\n      { label: 'แคลเซียม', amount: fmt(perServ.ca, 0) + ' มก.', pct: rdiPct('ca'), weight: 400, indent: '0' },\n      { label: 'เหล็ก', amount: fmt(perServ.fe) + ' มก.', pct: rdiPct('fe'), weight: 400, indent: '0' },\n      { label: 'วิตามินเอ', amount: fmt(perServ.vitA, 0) + ' มคก.', pct: rdiPct('vitA'), weight: 400, indent: '0' },\n      { label: 'วิตามินซี', amount: fmt(perServ.vitC) + ' มก.', pct: rdiPct('vitC'), weight: 400, indent: '0' },\n    ];\n\n    // ---- saved ----\n    const openSaved = (m) => () => this.setState({ screen: 'results', resultFrom: 'saved', viewMenu: m, perServing: true });\n    const menuRow = (m) => {\n      const t = this.totalsFor(m.items);\n      return {\n        name: m.name || 'เมนูไม่มีชื่อ',\n        initial: (m.name || 'ม').trim().charAt(0),\n        meta: m.items.length + ' ส่วนประกอบ · ' + m.servings + ' หน่วยบริโภค',\n        kcal: fmt(t.kcal / Math.max(1, m.servings), 0),\n        open: openSaved(m),\n        onEdit: this.startEdit(m),\n        onDelete: () => {\n          const saved = s.saved.filter(x => x.id !== m.id);\n          this.persist(saved); this.setState({ saved });\n        },\n      };\n    };\n\n    const alreadySaved = s.justSaved;\n    const canSave = !isViewingSaved && hasItems && !alreadySaved;\n\n    return {\n      // nav\n      isHome: s.screen === 'home', isCreate: s.screen === 'create',\n      isResults: s.screen === 'results', isSaved: s.screen === 'saved',\n      goHome: go('home'),\n      goCreate: () => this.setState({ screen: 'create', resultFrom: 'create', viewMenu: null }),\n      createTitle: s.editingId ? 'แก้ไขเมนู' : 'สร้างเมนู',\n      goSaved: go('saved'),\n      tabHomeColor: tab('home') ? '#078A86' : '#8AA5A3',\n      tabCreateColor: tab('create') ? '#078A86' : '#8AA5A3',\n      tabSavedColor: tab('saved') ? '#078A86' : '#8AA5A3',\n      tabHomeWeight: tab('home') ? 700 : 500,\n      tabCreateWeight: tab('create') ? 700 : 500,\n      tabSavedWeight: tab('saved') ? 700 : 500,\n\n      // home\n      dbCount: INGREDIENTS.length,\n      savedCount: s.saved.length,\n      hasSaved: s.saved.length > 0,\n      noSaved: s.saved.length === 0,\n      recentMenus: s.saved.slice(-3).reverse().map(menuRow),\n\n      // create\n      menuName: s.menuName,\n      onMenuName: (e) => this.setState({ menuName: e.target.value, justSaved: false }),\n      servings: s.servings,\n      servUp: () => this.setState({ servings: Math.min(20, s.servings + 1), justSaved: false }),\n      servDown: () => this.setState({ servings: Math.max(1, s.servings - 1), justSaved: false }),\n      itemCount: s.items.length,\n      noItems: !hasItems,\n      itemRows,\n      query: s.query,\n      onQuery: (e) => this.setState({ query: e.target.value }),\n      chips, results,\n      noResults: results.length === 0,\n      calc: () => { if (hasItems) this.setState({ screen: 'results', resultFrom: 'create', viewMenu: null, perServing: true }); },\n      calcDisabled: !hasItems,\n      calcBg: hasItems ? '#0ABAB5' : '#C7DEDC',\n      calcColor: hasItems ? '#fff' : '#7C9694',\n      previewKcal: hasItems ? '· ' + fmt(liveTotals.kcal, 0) + ' kcal' : '',\n\n      // results\n      resultName: rName,\n      resultMeta: rItems.length + ' ส่วนประกอบ · ' + rServ + ' หน่วยบริโภค · รวม ' + fmt(totals.weight, 0) + ' ก.',\n      backFromResults: () => this.setState({ screen: s.resultFrom === 'saved' ? 'saved' : 'create' }),\n      setPerServing: () => this.setState({ perServing: true }),\n      setWhole: () => this.setState({ perServing: false }),\n      segServBg: s.perServing ? '#fff' : 'transparent',\n      segServColor: s.perServing ? '#0B3B39' : '#5E7C7A',\n      segServShadow: s.perServing ? '0 2px 6px rgba(11,59,57,0.12)' : 'none',\n      segWholeBg: !s.perServing ? '#fff' : 'transparent',\n      segWholeColor: !s.perServing ? '#0B3B39' : '#5E7C7A',\n      segWholeShadow: !s.perServing ? '0 2px 6px rgba(11,59,57,0.12)' : 'none',\n      scopeLabel: s.perServing ? '(ต่อ 1 หน่วยบริโภค)' : '(ทั้งสูตร)',\n      heroKcal: fmt(T.kcal, 0),\n      heroME: fmt(meOf(T), 0),\n      pctP: pct(eP), pctF: pct(eF), pctC: pct(eC),\n      gP: fmt(T.protein), gF: fmt(T.fat), gC: fmt(T.carb),\n      rdiRows,\n      labelServSize: fmt(totals.weight / Math.max(1, rServ), 0) + ' กรัม',\n      labelServCount: rServ,\n      labelKcal: fmt(perServ.kcal, 0),\n      labelRows,\n      showEdit: !!isViewingSaved,\n      editMenu: isViewingSaved ? this.startEdit(s.viewMenu) : () => {},\n      saveMenu: () => {\n        if (!canSave) return;\n        const menu = {\n          id: s.editingId || Date.now(), name: s.menuName || 'เมนูไม่มีชื่อ',\n          servings: s.servings,\n          items: s.items.map(it => ({ ingId: it.ingId, grams: Number(it.grams) || 0 })),\n        };\n        let saved;\n        if (s.editingId && s.saved.some(m => m.id === s.editingId)) {\n          saved = s.saved.map(m => m.id === s.editingId ? menu : m);\n        } else {\n          saved = s.saved.concat([menu]);\n        }\n        this.persist(saved);\n        this.setState({ saved, justSaved: true, editingId: menu.id });\n      },\n      saveDisabled: !canSave,\n      saveBg: isViewingSaved ? '#E3F1EF' : (alreadySaved ? '#E0F5F4' : '#0B3B39'),\n      saveColor: isViewingSaved ? '#7C9694' : (alreadySaved ? '#078A86' : '#fff'),\n      saveLabel: isViewingSaved ? 'เมนูนี้บันทึกไว้แล้ว' : (alreadySaved ? '✓ บันทึกแล้ว — ดูได้ที่ \"เมนูของฉัน\"' : (s.editingId ? 'บันทึกการแก้ไข' : 'บันทึกเมนูนี้')),\n\n      // saved list\n      savedRows: s.saved.slice().reverse().map(menuRow),\n    };\n  }\n}\n\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
  </script>
